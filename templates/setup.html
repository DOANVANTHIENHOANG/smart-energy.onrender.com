<style>
    .setup-container { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; padding: 40px; color: white; }
    .module-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-top: 30px; }
    .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 20px; transition: 0.3s; }
    .glass-card:hover { border-color: #3b82f6; transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .device-icon { font-size: 2rem; color: #3b82f6; margin-bottom: 15px; }
    .config-row { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
    input[type="range"] { width: 100%; accent-color: #3b82f6; }
</style>

<div class="setup-container">
    <h1><i class="fas fa-tools"></i> Cấu Hình Hệ Thống V2 Pro</h1>
    <p style="color: #94a3b8;">Thiết lập thông số cho cầu dao điện tử và cảm biến thông minh</p>

    <div class="module-grid">
        <div class="glass-card">
            <div class="device-icon"><i class="fas fa-bolt"></i></div>
            <h3>Cầu dao Tòa nhà A</h3>
            <div class="config-row"><span>Ngưỡng ngắt (kW):</span> <b id="val1">5.0</b></div>
            <input type="range" min="1" max="10" step="0.1" value="5" oninput="document.getElementById('val1').innerText = this.value">
        </div>
        <div class="glass-card">
            <div class="device-icon"><i class="fas fa-snowflake"></i></div>
            <h3>Hệ thống Chiller</h3>
            <div class="config-row"><span>Nhiệt độ mục tiêu:</span> <b id="val2">24°C</b></div>
            <input type="range" min="16" max="30" value="24" oninput="document.getElementById('val2').innerText = this.value + '°C'">
        </div>
        </div>
    
    <button class="btn-submit" style="margin-top: 40px; width: 200px;" onclick="location.href='/main-system'">LƯU CẤU HÌNH</button>
</div>
