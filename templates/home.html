<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Building AI - Enterprise Solutions</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; }
        nav { display: flex; justify-content: space-between; padding: 25px 80px; align-items: center; background: rgba(15, 23, 42, 0.9); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 24px; font-weight: bold; color: #3b82f6; }
        .auth-btns a { text-decoration: none; padding: 10px 25px; border-radius: 8px; margin-left: 15px; font-weight: 500; transition: 0.3s; }
        .btn-login { color: white; border: 1px solid #3b82f6; }
        .btn-signup { background: #3b82f6; color: white; }
        .hero { height: 85vh; display: flex; align-items: center; padding: 0 80px; background: radial-gradient(circle at 70% 30%, #1e293b 0%, #0f172a 100%); }
        .hero-content { max-width: 600px; }
        .hero-content h1 { font-size: 60px; margin-bottom: 20px; line-height: 1.2; }
        .hero-content p { color: #94a3b8; font-size: 18px; margin-bottom: 40px; }
        .btn-main { background: #10b981; color: white; padding: 18px 45px; border-radius: 12px; text-decoration: none; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">BUILDING AI</div>
        <div class="auth-btns">
            <a href="/setup" class="btn-login">Đăng nhập</a>
            <a href="/setup" class="btn-signup">Đăng ký</a>
        </div>
    </nav>
    <div class="hero">
        <div class="hero-content">
            <h1>Quản lý Tòa nhà <br><span style="color: #3b82f6">Kỷ nguyên AI V2.1</span></h1>
            <p>Hệ thống tích hợp Gemini AI giúp tối ưu hóa 30% điện năng vận hành, tự động hóa kịch bản và dự báo phụ tải thời gian thực.</p>
            <a href="/setup" class="btn-main">Bắt đầu trải nghiệm</a>
        </div>
    </div>
</body>
</html>
